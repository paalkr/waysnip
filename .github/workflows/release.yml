name: Release

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libxkbcommon0 xvfb
      - name: Install
        run: pip install -e ".[dev]" build
      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest tests/ -v
      - name: Build
        run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract the section for the current tag version from CHANGELOG.md
          version="${GITHUB_REF_NAME#v}"
          awk "/^## \[${version}\]/{found=1; next} /^## \[/{if(found) exit} found" CHANGELOG.md > /tmp/release_notes.md
          cat /tmp/release_notes.md
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: /tmp/release_notes.md
      - name: Deploy docs
        run: |
          pip install ".[docs]"
          git fetch origin gh-pages
          mkdocs gh-deploy --force
