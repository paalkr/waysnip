site_name: WaySnip
site_url: https://paalkr.github.io/waysnip
repo_url: https://github.com/paalkr/waysnip
repo_name: paalkr/waysnip

theme:
  name: material
  palette:
    scheme: slate
    primary: blue
    accent: blue
  features:
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Install: install.md
  - Getting started: getting-started.md
  - Capture: capture.md
  - Annotation tools: tools.md
  - Gallery: gallery.md
  - Configuration: configuration.md
  - Keyboard shortcuts: shortcuts.md
  - FAQ: faq.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - tables
