<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- Monitor outline -->
  <rect x="1" y="2" width="14" height="10" rx="1.2" fill="none" stroke="#ddd" stroke-width="1.2"/>
  <!-- Selection rectangle -->
  <rect x="4" y="4" width="8" height="5.5" fill="none" stroke="#fff" stroke-width="1" stroke-dasharray="1.8,1"/>
  <!-- Corner handles -->
  <rect x="3" y="3" width="2" height="2" rx="0.4" fill="#fff"/>
  <rect x="11" y="3" width="2" height="2" rx="0.4" fill="#fff"/>
  <rect x="3" y="7" width="2" height="2" rx="0.4" fill="#fff"/>
  <rect x="11" y="7" width="2" height="2" rx="0.4" fill="#fff"/>
  <!-- Stand -->
  <line x1="6" y1="12" x2="10" y2="12" stroke="#ddd" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="8" y1="12" x2="8" y2="13.5" stroke="#ddd" stroke-width="1.2" stroke-linecap="round"/>
</svg>
