<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="#2b2d3a"/>

  <!-- Monitor outline -->
  <rect x="20" y="22" width="88" height="64" rx="6" fill="none" stroke="#c0c4d0" stroke-width="4"/>

  <!-- Selection rectangle (dashed) -->
  <rect x="38" y="34" width="52" height="36" rx="2" fill="none" stroke="#fff" stroke-width="3" stroke-dasharray="8,5"/>

  <!-- Corner handles -->
  <rect x="33" y="29" width="10" height="10" rx="2" fill="#fff"/>
  <rect x="85" y="29" width="10" height="10" rx="2" fill="#fff"/>
  <rect x="33" y="63" width="10" height="10" rx="2" fill="#fff"/>
  <rect x="85" y="63" width="10" height="10" rx="2" fill="#fff"/>

  <!-- Stand -->
  <line x1="48" y1="86" x2="80" y2="86" stroke="#c0c4d0" stroke-width="4" stroke-linecap="round"/>
  <line x1="64" y1="86" x2="64" y2="98" stroke="#c0c4d0" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="98" x2="78" y2="98" stroke="#c0c4d0" stroke-width="3.5" stroke-linecap="round"/>
</svg>
